name: Package

# Validates that standalone .deb and .rpm packaging works correctly.
# Does NOT upload to the release — Tauri's bundler already produces
# .deb and .rpm artifacts in the release workflow.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Debian / Kali package ─────────────────────────────────────────────────
  deb:
    name: Validate .deb (amd64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dpkg-dev lintian

      - name: Stamp version into debian/changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -R)"
          NEW_ENTRY="anya (${VERSION}-1) unstable; urgency=medium\n\n  * Release ${VERSION}.\n\n -- Daniel Iwugo <daniel@themalwarefiles.com>  ${DATE}\n"
          printf "%b\n$(cat debian/changelog)" "$NEW_ENTRY" > debian/changelog.new
          mv debian/changelog.new debian/changelog

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b --build-profiles=nocheck

      - name: Run lintian (non-fatal)
        run: lintian --no-tag-display-limit ../anya_*.deb || true

      - name: Smoke test .deb
        run: |
          sudo dpkg -i ../anya_*.deb
          anya --version
          anya --help
          anya --file tests/fixtures/simple.exe --json --no-color | head -5

  # ── RPM (Fedora / RHEL) ───────────────────────────────────────────────────
  rpm:
    name: Validate .rpm (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build release binary
        run: cargo build --release --locked -p anya-security-core

      - name: Build .rpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          sed "s/@@VERSION@@/${VERSION}/" .rpm/anya-security-core.spec > rpmbuild/SPECS/anya.spec
          rpmbuild -bb \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "_bindir /usr/bin" \
            rpmbuild/SPECS/anya.spec

      - name: Smoke test .rpm
        run: |
          RPM_FILE=$(find rpmbuild/RPMS -name "*.rpm" | head -1)
          rpm -qlp "$RPM_FILE" | grep -q '/usr/bin/anya'
          rpm -qip "$RPM_FILE" | grep -q 'Version'
