name: Package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Debian / Kali package ─────────────────────────────────────────────────
  deb:
    name: Build .deb (amd64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper devscripts dpkg-dev lintian

      - name: Stamp version into debian/changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DATE="$(date -R)"
          # Prepend a versioned entry so dpkg-buildpackage picks up the right version
          NEW_ENTRY="anya (${VERSION}-1) unstable; urgency=medium\n\n  * Release ${VERSION}.\n\n -- Daniel Iwugo <daniel@themalwarefiles.com>  ${DATE}\n"
          printf "%b\n$(cat debian/changelog)" "$NEW_ENTRY" > debian/changelog.new
          mv debian/changelog.new debian/changelog

      - name: Build .deb
        run: dpkg-buildpackage -us -uc -b --build-profiles=nocheck

      - name: Run lintian (non-fatal)
        run: lintian --no-tag-display-limit ../anya_*.deb || true

      - name: Collect artifacts
        run: |
          mkdir dist
          mv ../anya_*.deb dist/

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── RPM (Fedora / RHEL) ───────────────────────────────────────────────────
  rpm:
    name: Build .rpm (x86_64)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install cargo-rpm
        run: cargo install cargo-rpm --locked

      - name: Build release binary
        run: cargo build --release --locked -p anya-security-core

      - name: Build .rpm
        run: cargo rpm build

      - name: Collect artifacts
        run: |
          mkdir dist
          find target/release/rpmbuild/RPMS -name "*.rpm" -exec mv {} dist/ \;

      - name: Upload .rpm to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
