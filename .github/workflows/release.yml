name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Tauri GUI — macOS, Linux, Windows ──────────────────────────────────
  tauri-build:
    name: Tauri — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            artifact_name: anya_linux
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            artifact_name: anya_macos_universal
          - platform: windows-latest
            args: ""
            artifact_name: anya_windows
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Setup proprietary crate
        uses: ./.github/actions/setup-proprietary
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare YARA rules (signature-base)
        shell: bash
        run: |
          echo "Downloading Florian Roth signature-base..."
          git clone --depth 1 https://github.com/Neo23x0/signature-base.git /tmp/signature-base
          mkdir -p src-tauri/rules
          cp -r /tmp/signature-base/yara/* src-tauri/rules/ 2>/dev/null || true
          RULE_COUNT=$(find src-tauri/rules -name "*.yar" -o -name "*.yara" | wc -l)
          echo "Bundled ${RULE_COUNT} YARA rule files"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          #TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Anya ${{ github.ref_name }}"
          releaseBody: |
            ## Anya ${{ github.ref_name }}

            ### GUI (desktop app)
            | Platform | Download |
            |---|---|
            | **Linux** | `.AppImage` (universal) · `.deb` (Ubuntu 22.04+) · `.rpm` (Fedora/RHEL) |
            | **macOS** | `.dmg` (Intel + Apple Silicon) |
            | **Windows** | `.exe` (NSIS installer) |

            ### CLI (command-line)
            | Platform | Download |
            |---|---|
            | **Linux** | `x86_64-unknown-linux-musl.tar.gz` (static, works on any distro) |
            | **macOS** | `universal-apple-darwin.tar.gz` (Intel + Apple Silicon) |
            | **Windows** | `x86_64-pc-windows-msvc.zip` |

            ### One-line install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/elementmerc/anya/main/install.sh | bash
            ```

            ### Verification
            Every binary on this release is covered by `SHA256SUMS.txt` at the release root. Download it alongside the asset(s) you want and verify:
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for full details.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  # ── CLI Docker image ──────────────────────────────────────────────────────────
  # Pushes the multi-arch image to both GHCR (canonical) and Docker Hub (mirror).
  # GHCR uses the workflow's built-in GITHUB_TOKEN; Docker Hub requires the
  # DOCKER_HUB_USER + DOCKER_HUB_TOKEN secrets to be configured on the repo.
  docker-push:
    name: Docker — push to GHCR and Docker Hub
    runs-on: ubuntu-latest
    needs: tauri-build   # only push if GUI builds succeeded
    permissions:
      contents: read
      packages: write    # required for pushing to GHCR (ghcr.io/<owner>/<name>)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Setup proprietary crate
        uses: ./.github/actions/setup-proprietary
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "hub_image=${{ secrets.DOCKER_HUB_USER }}/anya" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.hub_image }}:latest
            ${{ steps.meta.outputs.hub_image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.ghcr_image }}:latest
            ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Smoke test Docker Hub image
        run: |
          docker run --rm ${{ steps.meta.outputs.hub_image }}:${{ steps.meta.outputs.version }} --version
          docker run --rm ${{ steps.meta.outputs.hub_image }}:${{ steps.meta.outputs.version }} --help

      - name: Smoke test GHCR image
        run: |
          docker run --rm ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.version }} --version
          docker run --rm ${{ steps.meta.outputs.ghcr_image }}:${{ steps.meta.outputs.version }} --help

  # ── Build standalone CLI binaries ────────────────────────────────────────────
  # Trimmed to essentials:
  #   Linux:   x86_64-musl (static, works on any distro)
  #   macOS:   universal (Intel + Apple Silicon in one binary)
  #   Windows: x86_64-msvc
  build-cli:
    name: CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: tauri-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            asset_suffix: x86_64-unknown-linux-musl
          - target: universal-apple-darwin
            os: macos-latest
            asset_suffix: universal-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_suffix: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Setup proprietary crate
        uses: ./.github/actions/setup-proprietary
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build CLI binary
        run: |
          if [[ "${{ matrix.target }}" == "universal-apple-darwin" ]]; then
            cargo build --release --target aarch64-apple-darwin -p anya-security-core
            cargo build --release --target x86_64-apple-darwin -p anya-security-core
            mkdir -p target/universal-apple-darwin/release
            lipo -create \
              target/aarch64-apple-darwin/release/anya \
              target/x86_64-apple-darwin/release/anya \
              -output target/universal-apple-darwin/release/anya
          else
            cargo build --release --target ${{ matrix.target }} -p anya-security-core
          fi
        shell: bash

      - name: Package (Unix)
        if: "!contains(matrix.os, 'windows')"
        run: |
          VERSION=${GITHUB_REF_NAME}
          ASSET="anya-${VERSION}-${{ matrix.asset_suffix }}.tar.gz"
          if [[ "${{ matrix.target }}" == "universal-apple-darwin" ]]; then
            cd target/universal-apple-darwin/release
          else
            cd target/${{ matrix.target }}/release
          fi
          tar czf "../../../${ASSET}" anya
          cd ../../..
          sha256sum "${ASSET}" > "${ASSET}.sha256" 2>/dev/null || shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $ASSET = "anya-${VERSION}-${{ matrix.asset_suffix }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/anya.exe" -DestinationPath $ASSET
          $hash = (Get-FileHash $ASSET -Algorithm SHA256).Hash.ToLower()
          "$hash  $ASSET" | Set-Content "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> $env:GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # ── Consolidated SHA256SUMS.txt ─────────────────────────────────────────────
  # Runs after every asset-producing job completes. Downloads every asset
  # attached to the release, produces one `SHA256SUMS.txt` file covering all
  # of them, and uploads that single file. Complements (does not replace) the
  # per-asset `.sha256` sidecars the CLI build job produces, which Chocolatey
  # still uses as a fallback. Downstream users verify with:
  #     sha256sum -c SHA256SUMS.txt
  # Added 2026-04-18 per Daniel's asset-consolidation direction; individual
  # `.sha256` sidecars can be retired in a future pass once the Chocolatey job
  # is updated to read from SHA256SUMS.txt instead.
  checksums:
    name: Release — consolidated SHA256SUMS.txt
    runs-on: ubuntu-latest
    needs: [tauri-build, docker-push, build-cli]
    permissions:
      contents: write
    steps:
      - name: Download every release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cd release-assets
          # Small delay to let the release-asset uploads from upstream jobs
          # propagate through the GitHub release API (eventual consistency).
          sleep 30
          # Pull every asset attached to this tag. Use --clobber to overwrite
          # any partially downloaded state from a retried run.
          gh release download "$GITHUB_REF_NAME" \
            --repo "${{ github.repository }}" \
            --pattern "*" \
            --clobber
          # Don't include any existing SHA256SUMS.txt from a prior run.
          rm -f SHA256SUMS.txt
          ls -la

      - name: Generate consolidated SHA256SUMS.txt
        run: |
          set -euo pipefail
          cd release-assets
          # Sum everything except per-asset .sha256 sidecars (those are hashes
          # of hashes and would be redundant) and any stale SHA256SUMS.txt.
          find . -maxdepth 1 -type f \
              ! -name "*.sha256" \
              ! -name "SHA256SUMS.txt" \
              -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's|\./||g' \
            > ../SHA256SUMS.txt
          echo "Generated SHA256SUMS.txt:"
          cat ../SHA256SUMS.txt
          echo "Asset count: $(wc -l < ../SHA256SUMS.txt)"

      - name: Upload SHA256SUMS.txt to release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt

  # ── Publish to Chocolatey ────────────────────────────────────────────────────
  # Chocolatey's human review queue has been slow/unresponsive as of 2026-04;
  # failures here don't block the rest of the release. continue-on-error keeps
  # the overall workflow green even when this job fails or times out.
  chocolatey:
    name: Chocolatey — publish
    runs-on: windows-latest
    needs: [tauri-build, build-cli]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $tag = "${{ github.ref_name }}"
          $base = "https://github.com/${{ github.repository }}/releases/download/${tag}"

          # Download the NSIS installer
          $installerDownloaded = $false
          foreach ($v in @($version)) {
            $nsisUrl = "${base}/Anya_${v}_x64-setup.exe"
            try {
              Invoke-WebRequest -Uri $nsisUrl -OutFile anya-setup.exe -ErrorAction Stop
              $installerDownloaded = $true
              Write-Host "Downloaded NSIS installer from: $nsisUrl"
              break
            } catch {
              Write-Host "NSIS installer not found at: $nsisUrl"
            }
          }

          # CLI zip uses git tag in filename
          $cliUrl = "${base}/anya-${tag}-x86_64-pc-windows-msvc.zip"
          $cliDownloaded = $false
          try {
            Invoke-WebRequest -Uri $cliUrl -OutFile anya-cli.zip -ErrorAction Stop
            $cliDownloaded = $true
            Write-Host "Downloaded CLI from: $cliUrl"
          } catch {
            # Try .sha256 file as fallback
            try {
              $sha256Url = "${cliUrl}.sha256"
              Invoke-WebRequest -Uri $sha256Url -OutFile cli.sha256 -ErrorAction Stop
              $cliHash = (Get-Content cli.sha256).Split(' ')[0].Trim()
              $cliDownloaded = $true
              Write-Host "Got CLI checksum from .sha256 file: $cliHash"
            } catch {
              Write-Host "CLI zip not found at: $cliUrl"
            }
          }

          # Compute checksums
          if ($installerDownloaded) {
            $msiHash = (Get-FileHash anya-setup.exe -Algorithm SHA256).Hash.ToLower()
            Write-Host "Installer SHA256: $msiHash"
          } else {
            $msiHash = ""
            Write-Host "WARNING: Could not download installer — checksum will be empty"
          }

          if ($cliDownloaded -and (Test-Path anya-cli.zip)) {
            $cliHash = (Get-FileHash anya-cli.zip -Algorithm SHA256).Hash.ToLower()
            Write-Host "CLI SHA256: $cliHash"
          } elseif (-not $cliDownloaded) {
            $cliHash = ""
            Write-Host "WARNING: Could not download CLI — checksum will be empty"
          }

          echo "MSI_CHECKSUM=$msiHash" >> $env:GITHUB_ENV
          echo "CLI_CHECKSUM=$cliHash" >> $env:GITHUB_ENV

      - name: Stamp checksums and version into package files
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"

          # Stamp chocolateyinstall.ps1
          $install = Get-Content .choco/tools/chocolateyinstall.ps1 -Raw
          $install = $install -replace '@@MSI_CHECKSUM@@', $env:MSI_CHECKSUM
          $install = $install -replace '@@CLI_CHECKSUM@@', $env:CLI_CHECKSUM
          Set-Content .choco/tools/chocolateyinstall.ps1 $install

          # Stamp VERIFICATION.txt
          $verify = Get-Content .choco/tools/VERIFICATION.txt -Raw
          $verify = $verify -replace '@@VERSION@@', $version
          $verify = $verify -replace '@@MSI_CHECKSUM@@', $env:MSI_CHECKSUM
          $verify = $verify -replace '@@CLI_CHECKSUM@@', $env:CLI_CHECKSUM
          Set-Content .choco/tools/VERIFICATION.txt $verify

      - name: Pack and push to Chocolatey
        if: env.MSI_CHECKSUM != '' && env.CLI_CHECKSUM != ''
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          choco pack .choco/anya.nuspec --version $version
          choco push anya.${version}.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }}
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}

      - name: Warn if checksums missing
        if: env.MSI_CHECKSUM == '' || env.CLI_CHECKSUM == ''
        run: echo "::warning::Chocolatey push skipped — could not compute checksums for release assets"
