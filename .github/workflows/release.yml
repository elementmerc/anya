name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Tauri GUI — macOS, Linux, Windows ──────────────────────────────────
  tauri-build:
    name: Tauri — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            artifact_name: anya_linux
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            artifact_name: anya_macos_universal
          - platform: windows-latest
            args: ""
            artifact_name: anya_windows
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Configure Cargo for private dependencies
        run: cp .cargo/config.toml.example .cargo/config.toml

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          #TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Anya ${{ github.ref_name }}"
          releaseBody: |
            ## Anya ${{ github.ref_name }}

            ### Installation
            - **Linux**: Download the `.AppImage` or `.deb` package
            - **macOS**: Download the `.dmg` (universal binary, runs on both Intel and Apple Silicon)
            - **Windows**: Download the `.msi` installer

            ### CLI (Docker)
            ```bash
            docker pull ${{ secrets.DOCKER_HUB_USER }}/anya:${{ github.ref_name }}
            docker run --rm -v /path/to/samples:/samples ${{ secrets.DOCKER_HUB_USER }}/anya:${{ github.ref_name }} /samples/file.exe
            ```

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/docs/CHANGELOG.md) for full details.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  # ── CLI Docker image ──────────────────────────────────────────────────────────
  docker-push:
    name: Docker — push to Docker Hub
    runs-on: ubuntu-latest
    needs: tauri-build   # only push if GUI builds succeeded
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Configure Cargo for private dependencies
        run: cp .cargo/config.toml.example .cargo/config.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.DOCKER_HUB_USER }}/anya" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Smoke test Docker image
        run: |
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }} --version
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }} --help

  # ── Build standalone CLI binaries for all platforms ──────────────────────────
  build-cli:
    name: CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: tauri-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            asset_suffix: x86_64-unknown-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            asset_suffix: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            asset_suffix: aarch64-unknown-linux-musl
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_suffix: x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_suffix: aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_suffix: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Configure Cargo for private dependencies
        run: cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl') && !contains(matrix.target, 'aarch64')
        run: sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (aarch64-musl)
        if: contains(matrix.target, 'aarch64') && contains(matrix.target, 'musl')
        run: |
          # cross handles cross-compilation via Docker containers —
          # no host gcc-aarch64-linux-gnu needed (and it 404s on GH runners).
          cargo install cross --locked

      - name: Build CLI binary
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            cross build --release --target ${{ matrix.target }} -p anya-security-core
          else
            cargo build --release --target ${{ matrix.target }} -p anya-security-core
          fi
        shell: bash

      - name: Package (Unix)
        if: "!contains(matrix.os, 'windows')"
        run: |
          VERSION=${GITHUB_REF_NAME}
          ASSET="anya-${VERSION}-${{ matrix.asset_suffix }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ASSET}" anya
          cd ../../..
          sha256sum "${ASSET}" > "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $ASSET = "anya-${VERSION}-${{ matrix.asset_suffix }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/anya.exe" -DestinationPath $ASSET
          $hash = (Get-FileHash $ASSET -Algorithm SHA256).Hash.ToLower()
          "$hash  $ASSET" | Set-Content "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> $env:GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
