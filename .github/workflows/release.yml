name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Tauri GUI — macOS, Linux, Windows ──────────────────────────────────
  tauri-build:
    name: Tauri — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            artifact_name: anya_linux
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            artifact_name: anya_macos_universal
          - platform: windows-latest
            args: ""
            artifact_name: anya_windows
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Configure Cargo for private dependencies
        run: cp .cargo/config.toml.example .cargo/config.toml

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          #TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Anya ${{ github.ref_name }}"
          releaseBody: |
            ## Anya ${{ github.ref_name }}

            ### GUI (desktop app)
            | Platform | Download |
            |---|---|
            | **Linux** | `.AppImage` (universal) · `.deb` (Ubuntu 22.04+) · `.rpm` (Fedora/RHEL) |
            | **macOS** | `.dmg` (Intel + Apple Silicon) |
            | **Windows** | `.msi` |

            ### CLI (command-line)
            | Platform | Download |
            |---|---|
            | **Linux** | `x86_64-unknown-linux-musl.tar.gz` (static, works on any distro) |
            | **macOS** | `universal-apple-darwin.tar.gz` (Intel + Apple Silicon) |
            | **Windows** | `x86_64-pc-windows-msvc.zip` |

            ### One-line install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/elementmerc/anya/master/install.sh | bash
            ```

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/docs/CHANGELOG.md) for full details.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  # ── CLI Docker image ──────────────────────────────────────────────────────────
  docker-push:
    name: Docker — push to Docker Hub
    runs-on: ubuntu-latest
    needs: tauri-build   # only push if GUI builds succeeded
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Configure Cargo for private dependencies
        run: cp .cargo/config.toml.example .cargo/config.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.DOCKER_HUB_USER }}/anya" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: Smoke test Docker image
        run: |
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }} --version
          docker run --rm ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }} --help

  # ── Build standalone CLI binaries ────────────────────────────────────────────
  # Trimmed to essentials:
  #   Linux:   x86_64-musl (static, works on any distro)
  #   macOS:   universal (Intel + Apple Silicon in one binary)
  #   Windows: x86_64-msvc
  build-cli:
    name: CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: tauri-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            asset_suffix: x86_64-unknown-linux-musl
          - target: universal-apple-darwin
            os: macos-latest
            asset_suffix: universal-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_suffix: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}

      - name: Configure Cargo for private dependencies
        run: cp .cargo/config.toml.example .cargo/config.toml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build CLI binary
        run: |
          if [[ "${{ matrix.target }}" == "universal-apple-darwin" ]]; then
            cargo build --release --target aarch64-apple-darwin -p anya-security-core
            cargo build --release --target x86_64-apple-darwin -p anya-security-core
            mkdir -p target/universal-apple-darwin/release
            lipo -create \
              target/aarch64-apple-darwin/release/anya \
              target/x86_64-apple-darwin/release/anya \
              -output target/universal-apple-darwin/release/anya
          else
            cargo build --release --target ${{ matrix.target }} -p anya-security-core
          fi
        shell: bash

      - name: Package (Unix)
        if: "!contains(matrix.os, 'windows')"
        run: |
          VERSION=${GITHUB_REF_NAME}
          ASSET="anya-${VERSION}-${{ matrix.asset_suffix }}.tar.gz"
          if [[ "${{ matrix.target }}" == "universal-apple-darwin" ]]; then
            cd target/universal-apple-darwin/release
          else
            cd target/${{ matrix.target }}/release
          fi
          tar czf "../../../${ASSET}" anya
          cd ../../..
          sha256sum "${ASSET}" > "${ASSET}.sha256" 2>/dev/null || shasum -a 256 "${ASSET}" > "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $ASSET = "anya-${VERSION}-${{ matrix.asset_suffix }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/anya.exe" -DestinationPath $ASSET
          $hash = (Get-FileHash $ASSET -Algorithm SHA256).Hash.ToLower()
          "$hash  $ASSET" | Set-Content "${ASSET}.sha256"
          echo "ASSET=${ASSET}" >> $env:GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  # ── Publish to Chocolatey ────────────────────────────────────────────────────
  chocolatey:
    name: Chocolatey — publish
    runs-on: windows-latest
    needs: [tauri-build, build-cli]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: meta
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $tag = "${{ github.ref_name }}"
          $base = "https://github.com/${{ github.repository }}/releases/download/${tag}"

          # Download the actual assets to compute checksums
          # MSI name uses tauri.conf.json version — try both tag version and config version
          $msiDownloaded = $false
          foreach ($v in @($version)) {
            $msiUrl = "${base}/Anya_${v}_x64_en-US.msi"
            try {
              Invoke-WebRequest -Uri $msiUrl -OutFile anya.msi -ErrorAction Stop
              $msiDownloaded = $true
              Write-Host "Downloaded MSI from: $msiUrl"
              break
            } catch {
              Write-Host "MSI not found at: $msiUrl"
            }
          }

          # CLI zip uses git tag in filename
          $cliUrl = "${base}/anya-${tag}-x86_64-pc-windows-msvc.zip"
          $cliDownloaded = $false
          try {
            Invoke-WebRequest -Uri $cliUrl -OutFile anya-cli.zip -ErrorAction Stop
            $cliDownloaded = $true
            Write-Host "Downloaded CLI from: $cliUrl"
          } catch {
            # Try .sha256 file as fallback
            try {
              $sha256Url = "${cliUrl}.sha256"
              Invoke-WebRequest -Uri $sha256Url -OutFile cli.sha256 -ErrorAction Stop
              $cliHash = (Get-Content cli.sha256).Split(' ')[0].Trim()
              $cliDownloaded = $true
              Write-Host "Got CLI checksum from .sha256 file: $cliHash"
            } catch {
              Write-Host "CLI zip not found at: $cliUrl"
            }
          }

          # Compute checksums
          if ($msiDownloaded) {
            $msiHash = (Get-FileHash anya.msi -Algorithm SHA256).Hash.ToLower()
            Write-Host "MSI SHA256: $msiHash"
          } else {
            $msiHash = ""
            Write-Host "WARNING: Could not download MSI — checksum will be empty"
          }

          if ($cliDownloaded -and (Test-Path anya-cli.zip)) {
            $cliHash = (Get-FileHash anya-cli.zip -Algorithm SHA256).Hash.ToLower()
            Write-Host "CLI SHA256: $cliHash"
          } elseif (-not $cliDownloaded) {
            $cliHash = ""
            Write-Host "WARNING: Could not download CLI — checksum will be empty"
          }

          echo "MSI_CHECKSUM=$msiHash" >> $env:GITHUB_ENV
          echo "CLI_CHECKSUM=$cliHash" >> $env:GITHUB_ENV

      - name: Stamp checksums and version into package files
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"

          # Stamp chocolateyinstall.ps1
          $install = Get-Content .choco/tools/chocolateyinstall.ps1 -Raw
          $install = $install -replace '@@MSI_CHECKSUM@@', $env:MSI_CHECKSUM
          $install = $install -replace '@@CLI_CHECKSUM@@', $env:CLI_CHECKSUM
          Set-Content .choco/tools/chocolateyinstall.ps1 $install

          # Stamp VERIFICATION.txt
          $verify = Get-Content .choco/tools/VERIFICATION.txt -Raw
          $verify = $verify -replace '@@VERSION@@', $version
          $verify = $verify -replace '@@MSI_CHECKSUM@@', $env:MSI_CHECKSUM
          $verify = $verify -replace '@@CLI_CHECKSUM@@', $env:CLI_CHECKSUM
          Set-Content .choco/tools/VERIFICATION.txt $verify

      - name: Pack and push to Chocolatey
        if: env.MSI_CHECKSUM != '' && env.CLI_CHECKSUM != ''
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          choco pack .choco/anya.nuspec --version $version
          choco push anya.${version}.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCO_API_KEY }}
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}

      - name: Warn if checksums missing
        if: env.MSI_CHECKSUM == '' || env.CLI_CHECKSUM == ''
        run: echo "::warning::Chocolatey push skipped — could not compute checksums for release assets"
