name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build Tauri GUI — macOS, Linux, Windows ──────────────────────────────────
  tauri-build:
    name: Tauri — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            artifact_name: anya_linux
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            artifact_name: anya_macos_universal
          - platform: windows-latest
            args: ""
            artifact_name: anya_windows
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          #TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Anya ${{ github.ref_name }}"
          releaseBody: |
            ## Anya ${{ github.ref_name }}

            ### Installation
            - **Linux**: Download the `.AppImage` or `.deb` package
            - **macOS**: Download the `.dmg` (universal binary, runs on both Intel and Apple Silicon)
            - **Windows**: Download the `.msi` installer

            ### CLI (Docker)
            ```bash
            docker pull ${{ secrets.DOCKER_HUB_USER }}/anya:${{ github.ref_name }}
            docker run --rm -v /path/to/samples:/samples ${{ secrets.DOCKER_HUB_USER }}/anya:${{ github.ref_name }} /samples/file.exe
            ```

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for full details.
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

  # ── CLI Docker image ──────────────────────────────────────────────────────────
  docker-push:
    name: Docker — push to Docker Hub
    runs-on: ubuntu-latest
    needs: tauri-build   # only push if GUI builds succeeded
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "image=${{ secrets.DOCKER_HUB_USER }}/anya" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
