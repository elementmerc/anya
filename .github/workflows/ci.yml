name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Rust: audit + lint + test + smoke + coverage ───────────────────────────
  rust:
    name: Rust (audit + lint + test + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Security audit
        uses: actions-rust-lang/audit@v1

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p anya-security-core -- -D warnings

      - name: Run tests
        run: cargo test -p anya-security-core --verbose

      - name: Smoke test binary
        run: |
          ./target/debug/anya --version
          ./target/debug/anya --help
          ./target/debug/anya --file tests/fixtures/simple.exe --json --no-color | jq .file_format

      - name: Install cargo-tarpaulin
        run: |
          curl -fsSL https://github.com/xd009642/tarpaulin/releases/latest/download/cargo-tarpaulin-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /usr/local/bin

      - name: Measure coverage
        run: cargo tarpaulin -p anya-security-core --out Xml --output-dir coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false

  # ── Frontend: tsc + build + Vitest (single job) ────────────────────────────
  frontend:
    name: Frontend (tsc + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

  # ── E2E: WebdriverIO + Tauri ───────────────────────────────────────────────
  e2e-test:
    name: E2E (WebdriverIO + Tauri)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Tauri + xvfb)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app (automation profile)
        env:
          TAURI_WEBVIEW_AUTOMATION: "true"
        run: npm run tauri build -- --debug

      - name: Run E2E tests (headless via xvfb-run)
        run: xvfb-run --auto-servernum npm run test:e2e
