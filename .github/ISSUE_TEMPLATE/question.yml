name: ❓ Question
description: Ask a question about using Anya
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: How do I...?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What have you tried? What's your use case?
      placeholder: I'm trying to analyze files in a directory but...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Anya Version
      description: Run `anya --version`
      placeholder: "0.3.0"
    validations:
      required: false